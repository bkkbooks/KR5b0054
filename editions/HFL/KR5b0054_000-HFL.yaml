front:
  text: 太上洞玄靈寳三元玉京玄都大獻經服二
  hash: sha256:1f5d7fc3ad0b4166aeb00502727501807a31b0321982595b9ef12d105d24195f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0054_HFL_000-001a, image: hfl/0181/0181-042.png}
body:
  text: 若夫至人妙本岀萬象之先大聖深源超六合之外不生不滅視聴之所未階無待無爲形名之所不及雖窈㝠玄絶而能應化無方眇邈虚沖而實濟益斯在若乃現金容於全闕示百萬之法身備玉簡於玊京開五方之要典莫不橋梁庶類開悟羣迷應感赴縁逗機行化至如今靈寳妙本理浄平夷但一切衆生違真喪實虚想妄見縱蕩六情方纒愛網遂使業淪五濁苦海所以無邊流浪三塗生死於兹浩漫自非至人引導無由出苦在我大聖天尊智周空有位過寰極道貫大羅闢衆妙之門洞重玄之境能以慈悲救物常善度人故乃託跡西那現山陽而演敎桑林之下薦寳玉以粧嚴發竒瑞於雲霞㪚靈香於淨域遍開妙相含笑而吐五光匝照諸天朗神輝於十界愍諸惡趣受苦衆生幽厄三塗沈纒八難因道君之請問告惡對之縁由說禍福之前徴論拔贖之功行故演此玄都大獻之法以敎人天普願五道還除罪源將令四生復保命籍此經題云太上洞玄靈寳三元玉京玄都大獻經夫經者感應爲宗慈救爲體願行爲用然今題釋詳略不同或汎解二乗或約陳三寶皆是後人臆度非關題經本意今研窮名理者尋事跡舉其指要以成一字仍於題中分爲二別所言二者前六字是通題後八字明其别題旣前通題之中又分爲二初太上二字舉天尊聖號明能說之聖人次洞玄靈寳四字顯至敎之深名明所説之正法初舉天尊聖號者太者泰也極大之尊名以明其體上者尚也窮髙之美稱以語其德明天尊德髙無上體大無窮德體雙陳故云太上次明所説之正法洞玄經者洞者通也同也玄者深也逺也言此經妙理深澄眞途寥廓通而無礙同而不隔是其洞也深而難測遠而莫窮是其玄也故曰洞玄靈寳者靈變不測之義寳者寳重珍貴之名言此妙經理𦤺幽玄靈變不測勸令行者皆可寳持故德經云我有三寳寶而持之即其義也次明别題者又分爲二前三元至大獻八字明目經意由後經一字明法教之通稱明目經意由者三元方欲顯明善惡之報懲勸之妙法故述上元中元下元以曉之言一切衆生生死命籍善惡簿録普皆係在三元九府天地水三官考校功過毫分無失所言三元者正月十五日爲上元即天官檢勾七月十五日爲中元即地官檢勾十月十五日爲下元即水官檢勾一切衆生皆是天地水三官之所統攝所以正月十五日爲上元天官校録者十一月一陽生正月三陽生三腸成乾乾者天之用也正月天道數成故一切天官主當校録所以七月十五日爲中元地官檢録者五月一隂生六月二隂生七月三隂生三隂成坤坤者地之用也七月坤氣王周故一切地官主當校録所以十月十五日爲下元水官校録者十月建亥亥屬北方北方是坎坎是水位正是水司建王之時故一切水官主當校録又三元者元本也但此上三官爲萬物之行本故曰三元玉京者三清妙境之山名玄都者大羅天中之宫號大獻者此經普校人天做學玄都大獻之法抜贖一切亡靈願行該廣故稱大獻明天尊慈憐兆庶故發神光道君愍念羣生爲轉經法具陳天地水官三官九府百二十曹四司五帝考録諸官各以三元之晨上詣玄都宫内校定人天善惡分别生死簿書所有善功咸蒙記録𡨕司謫罰並無收贖拔度之冝經文具載故上從天子下及兆人苦能遇此寳經依文修選採諸花果百味芬芳備盡人間珍竒異物列情勵志造大獻盤種種装嚴䖍心供養十方衆聖鑒照分明三代天尊流恩授受此乃目經意由也後明法敎之通稱者尋三洞眞文七部玄教討其題目僉號曰經是知經者法教之緫名至人之洪範經之爲美其大矣哉蓋羣品之舟航者也但經乃多種大略有三一者五德三元凝空雲篆垂芒八角祕妙之文二者青林紫筆金簡玉字包以鳯文藴藏於七寳玄臺或在山洞之中或在諸天之上三者簡䇿縑紙篆隷隨時傳授流通見行於代雖復有三迹而麤妙不同皆是大聖天尊詮至咸能治病悉名良藥但經之義訓訓亦多途舉其樞要略釋爲四所言四者一由二徑三法四常第一訓由者言三代天尊十方衆聖莫不因由經戒而得成道故曰由也第二訓徑者能開通萬物導達四生作學者之津梁實修眞之要徑故曰徑也第三訓法者言能爲㫖趣玄妙所致精微可以軌則蒼生楷模衆聖故曰法也第四訓常者言非但妙理深遠湛寂凝然抑亦三代法王不刋之術具斯四義故得稱經就此一卷之中又爲四也第一從初至徹照諸天名爲序分第二從爾時衆聖下至難可㧞贖名爲正説分第三從爾時太上道君得聞命㫖下盡頌終名爲通傳分第四從爾時聖衆下名爲緫結就初序分之中又分爲五第一舉天尊與徒衆雲集第二從俱在西那玉國下次明淨土方所第三從敷黄金薦地白玉縁階下至正述國土裝嚴第四從黃雲四緾紫霞三匝下表諸祥瑞第五從是時天尊含笑下明岀威光太上洞玄靈寳三元玉京玄都大獻經元始天尊與太上道君十方大聖飛天神王七千二百四十童子俱在西那玉國鬱察之山浮羅之嶽長桑林中釋曰此則開宗發迹之道備諸賢聖之目即是第一舉天尊與徒衆雲集之時并明淨土方所元始天尊者至聖之洪名生成之大號逺窮溟涬歎以爲言近尋教迹方可立稱又元始者言其最先天尊者語其髙妙故曰元始天尊太上道君者得道之聖人飛天神王者自在之靈智童子者内無嗜慾外絶營求至性不虧湛然凝寂俱在西那玉國鬱察山中浮羅之嶽此爲淨土方所即玉京之妙境碧虚之上界亦言此土之人純浄潔白或如白玉乍等嚴霜因此立名稱玉國又更山名鬱察嶽號浮羅林有長桑便爲題目此説經之處乃具而言之猶如孔子定書老君說經於函谷向來旣標說經之聖人并顯説法之處所更顯所居之處有何珍異敷黄金薦地白玉縁階七寶琳琅光明煥日黃雲四緾紫霞三匝香光緾薈衝溢虚空釋曰此是天尊所居之處即是第三述國土莊嚴并表祥瑞敷者布也言其說法之所悉以黄金遍布其地階之邊並用白玊而爲縁飭七寳者金銀琉璃珊瑚琥珀𤥭𤦲瑪碯之類琳琅者即玉之别名也天尊所居之處衆寳珍竒莊嚴妙麗光彩煥爛朗徹十方照耀諸天明於日月故云光明煥曰黄雲四𦆑紫霞三匝者此是表諸祥瑞黄即中方之色也復有正色呈祥喜雲顯瑞一時俱合四面而來蓊蔚榦闐周旋團遶又更紫氣輕霞縈盤三匝靈風扇動香氣氤氳鬱溢虚空而爲供養釋曰不道餘事而言紫霞者朱黑相雜而爲紫霞朱曰腸曰道黑曰隂曰德明天尊道德猶若慈雲䕃覆衆生恩隆父母但以上界天堂珍竒雅妙華飾果報自然與俗不同將音樂奇能亦應殊異天鈞大樂竒雅妙音萬種互作釋曰天鈞者自然之竒響大樂者非常之妙曲故曰竒雅妙音萬種互作者言所奏音聲皆自然而至千種萬伎娯樂天尊諸天旣獻諸珍竒并奏雅音天尊歡喜顯所靈相天尊舎笑五色光明從口中岀徹照諸天此是天尊歡喜顯靈相即是第五明出威光從上至此緫爲序分但天尊常適故若含笑照同春景毎有光明所在䝉恩無不徹照但道眼清淨衆聖共同俱在會中冝應利見爾時衆聖俱在一處普見十方無極世界地獄之中此是衆聖乘天尊威光地獄之中無不覩見爾時者即是天尊説法之時衆聖者不一之稱但衆旣同悉皆普見未知地獄之中有何貴罰囚徒謫役餓鬼死䰟祼身無衣頸脚鎖械此明衆生宿業不修善根諸惡備造死入地獄餓鬼道中祼形飢羸頭頸鎖械但餓鬼死䰟身旣無衣項上著鎻脚上連械未知中間甚爲楚痛足立劔樹頭戴火山此皆随縁所受言豈直飢餓裸形每令身負鐡杖足立劒樹頭戴火山焚割其痛毒難忍或頭然火炭足立刀山摧逼驅馳考以鐡杖四肢鎖械運動無由萬劫之中恒受斯罪此類衆生旣受斯苦痛未審中間更有何色類大小相牽五體爛壞頭面燋燎鑊湯煑漬萬痛切身釋曰此等狀跡即文可知皆由前身彈射飛鳥殺害衆生布網張羅飛鹰走犬刳胎探卵鼎鑊烹燖廣造諸愆有此報對金鎚亂拷食息無閑飢即食炭渴飲火精此是惡業衆生造罪非一慳貪過重餓鬼報身飢欲求食食成火炭渴方就飲水變火精此縁慳貪障閉功德此乃諸經具明非唯今爲子説萬劫恒在餓鬼道中大衆慈悲稱無量善一時舉手彈指敬禮尋聲救苦天尊願生生世世慕作慳貪障閉功德受如此報非直只餓鬼道中亦更餘處流曵三塗五苦之中此言非直一處受報乃更流曵三塗八難之中無不周遍三塗者即是地獄道畜生餓鬼道五苦者抱銅柱履刀山循劔樹入鑊湯吞火食炭并三塗地獄是名八難但衆聖慈悲恒懷愍念旣斯痛切應有問端其次之若爲起請逍君稽首上白天尊未審此軰罪人生世之日行何罪業作何因縁受斯楚痛伏願天尊賜垂訓勵告所未聞如蒙開悟仰受聖恩此明道君爲請問欲今未悟咸悉知聞道君旣是聖人先巳悟知業報於慈爲其發問欲以教化衆生道君旣問因縁天尊作何酬答天尊告曰欺罪人也皆由前縁不見明教不聞法音慳貪無度殺害無辜口是心非禁繫賢人飲酒食肉禍亂五神此是天尊道君所問告示因縁諸如此言等皆衆生之惡業但大道天尊慈悲救度神光普被遠照十方故使道君承威語問旣知敬請具辯因縁言此業障罪人前有過不見明科聖教不聞正法靈音唯事慳貪不崇功德絶天堂路作地獄因沈溺愛河漂流生死五神者即五藏神也䰟𩲸神精志是也但飲酒食肉罪業旣深非直濁亂五神抑亦輪迴八難遂使六根三業廣造諸愆匿惡潛怨身心不善任情殺生貪恡無端失道乖眞不知迴向一入地獄終無出期罵詈呪詛呌喚神明欺師罔道穢慢三光篡君殺父侵暴宗親如此之義分明可知但其呪詛之時冀欲前人早敗呼神喚鬼無所不爲如此言詞造次難盡此言過去生中愚癡欺慢心無敬忌增上驕奢或欺慢法師口誣眞聖穢觸日月輕慢星辰爲臣不忠爲子不孝篡殺君父之處聖人難之取其漸而害之故云篡弑易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣篡即奪也弑即殺也聖人惡之易其名也心懐諂曲不念衆生潛行竊盗嗊嗃無端割奪功德以饒一身不肯布施散乞貧人今受斯苦以酬宿怨其目如此此等皆是人中所行之事其義可知諂希意之意謂之諂布施者以已有濟人之急遍布旣均名之布施莊子曰青青之麥生於陵陂生不布施死何含珠爲生有攻劫之憂死有掘塚探棺之患但俗間惡業其數極多略說而言之難以窮悉大網名目有如此等天尊以次而說偈言天尊以其向來問答次序重申其意詳而說之其名曰偈偈者讃頌之别名也重明其義故易之曰偈篡殺於君父殺害無辜人死受金鎚打鐡杖不去身此即偈之文也前文中篡殺在後今偈則篡殺在前者但君父之重自古爲先三千之條無殺故於偈中而爲稱首此重明上長行中篡君父義乘闇入他家掠奪人財物死䰟墮幽獄萬劫不得出此等之言其義可解故莊論云爲不善於顯明之中者人得而誅之爲不善於幽闇之中者鬼得而誅之明於人明於鬼者然後能獨行故知㝠司叵罔神逍難欺所有罪愆纎毫必録善惡報應如影隨形一墮三塗萬劫無出此重明上長行竊盗之罪奢婬好細滑穢慢於三光死䰟受幽閉後生並癡狂此明身之業罪言邪行之人躭婬無度唯貪色慾細滑是求觸犯日月星辰不避三光明受罪旣終始生人逍雖得人身乃被顚狂愚癡之報此即明其身業之罪次陳口業更後若爲凶橫作口舌鬭亂於宗親死受鎔銅灌後身恒吠人此即明其口業但口業之人專行綺語虚傳口舌鬭亂宗親反是爲非破他和合妄生禍福損陷於人死入地獄之中即鎔銅灌口受罪之後餘業更生報處狗身見人恒吠食噉於衆生飲酒亂五神死受鑊湯煑鐵杖不去身此言噉食之人殘他性命飮酒食肉不念衆生遂今五藏之神昏迷濁亂口貪肥飽不悟業報隨身及至命終沈淪地獄鑊湯爐炭煎煑其身萬痛交連恒不去體此重明上長行中飲酒食肉之罪嗊嗃虚爲實欺誘頑益已死受拔舌報後生不得語此言妄語之人公行譎詐以至欺誑眩誘巧作多端恒爲不軌謀之以求益己之事死後䰟沈地獄乃受拔舌之殃罪畢報生仍令喑啞此明妄語之罪覆上長行中嗊嗃無端欺師不信道呌喚於神眀流曳三塗中後生六畜身但以誑惑師尊罔誣眞聖輕三寳穢靈文於道中謾生分别口彰麤横呪詛爲言牽引神明髙呼大喚嬰𦆑惡業墜陷三塗輪轉去來死生勞曳受罪旣畢更處六畜之形沈滯多身失於人道此明欺天之罪覆上行中欺師罔道呌喚神明䜛謗擊賢人諂曲作無端死墮毒獸螫輾轉無一歡但讒䛕謗讟潛擊賢人諂進曲巧陳詐其人命蜂蠆之身或作蚖虵或蝮蝎諸毒蟲等次遞遍爲輾轉穢惡受生何時更知歡樂從凶橫作口舌至於緫明口業報對自此以下舉其意業減割功德物以縱慳貪心死䰟爲餓鬼飢渴飲火精此具明意業但崇善之減己削身布施財物造經像以爲存亡或有貪人中間割截功德物一時雖得潤己報罪如影隨形死墮餓鬼之中飢則吞火食炭貪欲之罪招報如斯萬劫千生不聞漿水名字飢即食炭渴飮火精此明貪欲之罪覆上長行中割奪功德以饒一身侮慢於耆德不敬有道人後生爲下賤報處六畜形此明是非人我不敬師尊侮慢耆德即於賤之人報生不敬崇三寳死受六畜之身業報相隨一無差失或生於邊地下賤外逺蠻夷雖復受得人身不聞三寳名字眞經正法萬劫難逢聖教靈文何由可見割減功德物至此明其意業天尊說偈旣了道君作禮請天尊說此偈己太上道君前進作禮上白天尊今日欣會慶亦難言天尊垂肹賜告罪根未審斯等罪人皆有眷屬見在親羅爲當即身更無後嗣天尊說偈旣終道君懷疑將問若不教拔贖衆生無出苦門冀垂救度之方所以殷勤請問前進稽首作禮與言天尊慈悲賜垂指訣謹聞命㫖慶幸難言道君又知衆生男女子孫代代不絶將欲敎其胤緒救拔先亡故起問端以招後義天尊告曰雖有男女種前業根不修功德不作因縁何由可免輾轉增篤沈淪罪田億劫辛苦無由得還衆惡備履望反綿綿天尊言其罪人後代男女子孫眷屬旣無功德唯有地獄因縁輾轉增多彌加篤厚終旣悲䰟苦𡙁沈滯淪迴罪穢心田種前惡業又云積惡之人罪可滋植猶如枳棘藂生荒穢之田縱有五榖善芽落在其中終被沈蕪淪翳不得秀苗成實故云罪田天尊以其地獄罪深將與救拔盛淪難免之義以招更問之端道君稽首又問天尊作何因縁得離衆苦行何福業得還人中釋曰道君愍念衆生沈淪地獄重與吿問以樹福田欲使孝子順孫念先亡之苦痛慈兄悌弟憶骨肉之淪沒減削家財以相救拔重爲斯問崇起福田此下舉天尊告罪罪類不同令作大獻拔贖之法就此之中分爲三段初明罪衆不同卒難救濟第二舉元校録令識歸崇第三爾時衆奉之儀勸今倣學天尊告曰斯等罪人造罪旣多非是一類若欲救拔亦難可周非一人力得以濟免問此是第一明罪衆不同卒難救濟天尊以其業報相隨罪根難抜但立功樹福田非願廣不遷移謝罪除殃非功多不克若以一人之力不可免濟羣凶故知行惡之人卒難救拔自非多崇縁業廣建福田若不憑藉衆縁造次何能濟度旣須功德欲爲何等次去以下功德若爲當依玄都大獻法七月十五日中元之辰地官校戒擢選衆人分别善惡諸天大聖普詣宫中簡定劫數人鬼簿録餓鬼囚徒一時俱集問此是第二段令識歸崇言天尊三元大會之日兼陳九府檢勾之由具明搜之晨委示諸官校定善惡之際使來世衆生令依此三元之日各各上倣玉京玄都大獻軌則供養三代天尊十方聖衆九玄七祖法界蒼生咸蒙拔贖之因俱得解脫此七月十五日是中元地官校戒之日十方衆聖普來集會於是天官水官及諸曹等五億五萬五千五百五十五億賢聖俱會簡定劫數考校罪人輕重等級欲於此日以設供養拔度父母亡靈未知作何法用以其日夜焼香然燈照耀諸天九幽長夜八門之中作玄都大獻倣玉京山採諸花果依以五色世問所有衆竒異物道具名珍綾文錦綺翫弄服飾十絶旛幢寳蓋莊嚴供養之具餚膳飲食百味芬芳獻諸衆聖及道士等釋曰此是第三示修奉之儀勸令倣學說五色者即是青黃赤白黑是也交復五色之繒以爲旛蓋莊嚴供養天尊以見地獄罪人動經億劫故令孝養父母爲過去先亡採拾人間所有珍竒異物倣効玄都玉京以爲供養之具獻諸十方衆聖及道士等救拔過徃亡靈地獄之苦當願九玄七祖法界蒼生憑兹供養之因並獲天堂之果報欲屈十方衆聖及道士等作何功德於其日夜講説是經十方大聖齊詠靈篇囚徒餓鬼當得解脫一俱飽滿免於衆苦得還人中自非如斯難可拔贖釋曰天尊廣陳諸法冀在勸示因縁當恐正信者稀所以重重付囑毎於大獻之命皆今啓請法師日夜六時修齋講說其日衣者即是今七月十五日夜於此日當修齋建講燒香然燈照耀諸天九幽之内八門之中九幽者九幽地獄也八門者八難之門並是衆生受罪之處至此三元齋日倣玄都玉京作大獻之法備盡人間所有珍竒異果百味芬芳供養三寶於是十方及道士等感此至言爲之誦詠上通九億下徹六天地獄罪人一時解脱吾過去後東善非極西惡非深苦縣君子當之大秦上皇之後三萬六千年此劫數盡天地將壞人人塗炭釋曰天尊說此經時言我過去之後皆有教化之人累起相襲代代常有聖明王紹隆三寳東善非極西惡非深者言東方未必極善而無惡西方未必深惡而無善苦縣君子即是老君應身玄妙玉女割左腋而生於陳郡苦縣故云苦縣堂玉之際東西南北行九步因即能言自指李樹爲姓天上天下唯我獨尊即九龍從地踴出吐水沐浴出龍之地便爲九井至今見在又云老君應身三界火宅苦海之中亦是一苦縣也當之大秦即西方天笁之别名也之適也老君西至流沙適於罽賓行浮圖之教以化戎俗故後漢書云老君說浮圖經以化戎俗言浮圖好清淨今之釋中浮圖經者即老君之所說也但以僧衆無知妄爲添解訛義前聖疑惑後人致更作僞返眞更相引導淳朴之敎於兹遂澆華文競典姦訛彌煩朴散淳澆邪僞紛葩無極世世男女之人性習慳貪死爲餓鬼飢其䰟神授食不得變爲埃塵釋曰未斷澆訛專行浮詐無極世界即此方之名也亦名𨶒浮之界但此土衆生承爲嬌恠邪淫顚倒迷惑糺紛旣慳貪是非人我死爲餓鬼以報宿愆與食變作埃塵眼見不能入口浩劫辛苦塗炭洗淪輾轉五道以報昔怨今故相告冝遵之焉來生男女當自翹勤勤情勵巳勿爲罪由也釋曰浩者大也言廣大劫來常爲餓鬼縱命更受罪得了還生下賤之家輪迴五道之間必竟不能成聖五道者即爲天堂道人道畜生道地獄道餓鬼道天尊更勸勵以告道君來生男女當自克翹心勤勵志勿作罪由罪由者即罪業也言人所爲善惡必獲其報猶如種田收子各隨種類春種秋收故曰罪田爾時太上道君得聞命㫖稽首作禮而説偈言此即名道分爾時者即是天尊說法縁記付前道君之時太上道君旣聞天尊說是大獻拔度之經又説今生來生之誡殷勤教誨宣布流轉稽首尊前讚歎其美奉承妙㫖慶幸難言善旣不可思議遂即因而説偈前生有縁會今得見天尊先說今劫巳復告後劫愆釋曰此則道君自欣幸故遂作偈讚天尊前代今生道縁相會遂得親承至道覲謁天尊又蒙告示因縁以相拔度傳授付囑速轉法輪立誓勤行不生怠慢前劫後劫皆蒙道恩又後劫愆者二云後身道君以誡衆生貪嗔癡罪故說此偈但貪欲之人好爲積貯廣求財物唯事驕奢各擅豪華不崇功德心無慈悲不念衆生今生不堅福田死後沈淪惡道如此之報决定無疑皆前身不修善功後身受其殃告諸如此等並是後劫之深愆也勤行修至道勿與有爲怨貪欲成大患嗔癡爲禍源釋曰此偈誡貪欲嗔癡罪道君意欲覺悟羣迷故作頌論其因縁之本禍福之源言貪欲者累身之患嗔癡者爲禍敗之根源故略述所由勸令除斷又道君旣開天尊之教因而演說以此爲將來之誡但以財色名利是禍患之源貪欲嗔癡是滅身之本然豈爲修眞妨人道行抑亦喪失福田若能三毒不與六根清浄即是修生之道塵觸不嬰可爲拔苦之津梁更有何灾難斷除煩惱障三業自清閑邪魔不能亂豈遭地獄艱釋曰但煩惱所生因由三業邪魔擾亂縁起六根但能抱道守眞塵觸豈能相染只如亂心之始色欲爲先地獄之因邪淫是本若俗斷除煩惱當須清閑求其長樂之因會是六根無染若能修行天尊之教常依玄都大獻之日供養十方天尊則逍遥金闕之前長無地獄之患遊沙琳瑯苑高歩七寳園逍遙恣無欲稽首禮天尊釋曰道君言若後有人於三元日修齋建講依玄都獻法供養十方大聖及道士等功成業著得爲天尊遊行上界西那玉國自然珍寳無有窮盡過徃亡靈皆離苦難不落三塗次下明諸衆聖歡喜旋遶爾時十方衆聖得聞天尊妙法拔度之因聞所未聞悟所未悟遂乃同聲讚善歡喜奉行誦詠歩虚周迴旋遶稽首禮謝讚歎天尊太上道君十方衆聖旣說偈巳天尊更有何訓勵太上道君十方大聖說偈頌巳天尊告曰三元齋日皆須講說是經勤修禮拜六時行道香湯潔巳過中不味內外恬夷淡泊無爲不交人事先授十戒靜心閉意思神念眞想存在法爾時衆聖一時稽首請奉戒文釋文此則天尊慈悲重垂訓勵又復宣傳戒法修奉之儀但以聖人常修淨行湛然無慾不渉垢塵冀在垂教化凡拯救愚昧故於此日誘引殷勤更說戒文令遣保䕶清齋潔己思神念眞日夜受持存念三寳當來成道得見天尊遊宴玉京逍遥金闕此是三元之日建講設齋拔度先亡得福如是天尊旣垂戒法其文若爲天尊告曰第一戒者不得殺生淫祀六天神鬼第二戒者不得竊盗爲非取他財物第三戒者不得愛樂美色嫉妬非法第四戒者不得妄言綺語以爲口過第五戒者不得躭酒沈酗蹤横無度第六戒者不得嗊嗃自是欺謗兆人第七戒者不得欺師罔道損棄聖典第八戒者不得嗔恚四輩訕謗道士第九戒者不得貪覔過度損物益己第十戒者不得觸罵宗親不敬耆老此十戒者身之大患犯之者風刀萬劫恒值惡縁善心信敬開導後人勤行諦聴受勿忘言行之如法生不犯過死無拘閉天降雲軿自然得道釋曰此即是其十戒并是修奉之儀護持者剋獲於人天犯之者必沈於地獄若有善男子善女人能持此十戒踴猛精進心不懈倦行與道合乃無違失生則爲教所仰死則升彼上清駕躡雲車往來無礙超越三界金剛之軀若犯之者則淪五苦歷三塗劔樹刀山毎令廵履牛頭獄卒催逼馳驅肉散如星骨消如雨萬劫受苦不捨須㬰恒值惡縁怨怨相對違經犯戒地獄獲殃如法修行天堂受樂自次以下道君重問三元齋法此舉下文更作若爲啓請太上道君稽首禮曰三元齋法中元之㫖前已具聞未審上下二元依何法式釋曰此三元齋法俱在衆經道君恐來代愚蒙多所不悟再興髙問冀垂未聞於此會中殷勤重請天尊所答其此若爲天尊告曰此三元齋三録定簡靈寳要文正月十五日者此爲上元天官檢勾十月十五日者此爲下元水官檢勾此者所攝不同釋曰此即天尊告示三元由委言此三元之法是三録定簡岀靈寳要文所攝不同者爲上元左府主生生太陽火官考下元即右府主死死太隂水官考中元主生死簿録一切地獄囚徒罪福之事風刀之考各領察九萬衆凡有一十二月其中元下元三府兩同然香旋遶者各爲上元知生下元知死之途旣别統攝是以不同故云所攝不同今所陳說七月十五日作玄都大獻者此乃總管上下二元故以相告冝遵之焉釋曰此言中元通括上下一切都和勘當餓鬼囚徒並在今日但今日中元道攝上下二元其功最重故玄都獻法拔度先亡所以不言天官水官唯稱中元者唯中元地官地官處中中是正色故舉中元以攝上下又萬物至秋皆悉成結所以取其方金即熟故以七月十五日中元之辰以爲供養又一切餓鬼罪䰟今日皆蒙釋放中元教戒之日玄都大獻之晨常須建福修齋行道講經供養三寳拔度亡靈旣此一時地獄囚徒咸蒙福祐遵則享祚洩則禍臻釋曰但天尊奉大獻之供享福無極輕洩大獻之經則禍臻萬劫太上道君十方大聖飛天神王七千二百四十童子聞是說巳一時歡喜作禮而去釋曰上聖慈悲常惟救度至於宣揚妙法光闡玄風冀其至言寧不歡喜於是虔心踴躍作禮而行各適彼方殷勤教化太上洞玄靈寳三元玉京玄都大獻經
